on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
      - run: make check
      - run: make delete
